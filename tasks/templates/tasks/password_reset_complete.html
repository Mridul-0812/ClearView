{% extends "tasks/layout.html" %}

{% block body %}
<div class="welcome-background">
    <div class="glass-card">
        <div class="logo-wrapper">
            <h1 class="brand-logo">ClearView</h1>
            <div class="logo-underline"></div>
        </div>
        
        <div class="success-icon">✓</div>
        
        <p class="tagline">Password Changed</p>
        
        <p class="success-message">
            Your password has been set successfully. You may now log in with your new credentials.
        </p>

        <div class="footer-links">
            <a href="{% url 'tasks:login' %}" class="btn-signin" style="display: block; text-decoration: none;">Sign In</a>
        </div>
    </div>
</div>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Alex+Brush&family=Inter:wght@300;600&display=swap');

    .welcome-background {
        height: 100vh;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .glass-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(20px);
        padding: 3.5rem 2rem;
        border-radius: 40px;
        text-align: center;
        width: 400px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .brand-logo {
        font-family: 'Alex Brush', cursive;
        font-size: 3.5rem;
        margin: 0;
        color: #2d3436;
    }

    .success-icon {
        font-size: 3rem;
        color: #55efc4;
        margin: 1rem 0;
    }

    .tagline {
        font-family: 'Inter', sans-serif;
        color: #636e72;
        font-size: 0.8rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 1rem;
    }

    .success-message {
        font-family: 'Inter', sans-serif;
        color: #2d3436;
        font-size: 0.9rem;
        line-height: 1.6;
        margin-bottom: 2rem;
    }

    .btn-signin {
        background: #716cf2;
        color: white;
        padding: 14px;
        border: none;
        border-radius: 16px;
        font-family: 'Inter', sans-serif;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .btn-signin:hover {
        background: #5a54d6;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(113, 108, 242, 0.3);
    }
</style>
{% endblock %}
