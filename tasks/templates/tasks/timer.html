{% extends "tasks/layout.html" %}

{% block body %}
<div class="main-wrapper" style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
    <div class="app-container" style="max-width: 500px; text-align: center; padding: 40px; background: rgba(0, 0, 0, 0.25); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);">
        
        <div class="header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <a href="{% url 'tasks:index' %}" style="text-decoration: none; color: white; font-size: 0.9rem; opacity: 0.9; font-weight: 600; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">← Back</a>
            <h1 style="margin: 0; font-size: 1.8rem; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.4);">Focus Hub</h1>
            <div style="width: 40px;"></div>
        </div>

        <div style="background: rgba(0,0,0,0.3); border-radius: 50px; padding: 5px; display: inline-flex; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.1);">
            <button onclick="switchMode('stopwatch')" id="sw-tab" style="border: none; background: rgba(255,255,255,0.2); color: white; padding: 10px 24px; border-radius: 50px; cursor: pointer; font-weight: 700; transition: 0.3s;">Stopwatch</button>
            <button onclick="switchMode('timer')" id="tm-tab" style="border: none; background: transparent; color: #e0e0e0; padding: 10px 24px; border-radius: 50px; cursor: pointer; font-weight: 700; transition: 0.3s;">Timer</button>
        </div>

        <div id="timer-inputs" style="display: none; gap: 15px; justify-content: center; margin-bottom: 20px;">
            <div style="display: flex; flex-direction: column; gap: 5px;">
                <label style="color: #e0e0e0; font-size: 0.7rem; font-weight: 800; text-transform: uppercase;">Mins</label>
                <input type="number" id="input-mins" placeholder="00" min="0" style="width: 80px; background: rgba(0,0,0,0.4); border: 2px solid rgba(255,255,255,0.3); border-radius: 12px; color: white; padding: 12px; text-align: center; font-size: 1.2rem; font-weight: 700; outline: none;">
            </div>
            <div style="display: flex; flex-direction: column; gap: 5px;">
                <label style="color: #e0e0e0; font-size: 0.7rem; font-weight: 800; text-transform: uppercase;">Secs</label>
                <input type="number" id="input-secs" placeholder="00" min="0" max="59" style="width: 80px; background: rgba(0,0,0,0.4); border: 2px solid rgba(255,255,255,0.3); border-radius: 12px; color: white; padding: 12px; text-align: center; font-size: 1.2rem; font-weight: 700; outline: none;">
            </div>
        </div>

        <div id="display" style="font-size: 6rem; font-weight: 800; color: white; text-shadow: 0 10px 40px rgba(0,0,0,0.5); margin: 10px 0; font-family: 'Courier New', Courier, monospace; letter-spacing: -2px;">
            00:00:00
        </div>

        <div class="controls" style="display: flex; gap: 15px; justify-content: center; margin-top: 25px;">
            <button id="startBtn" onclick="handleStart()" style="background: #10b981; border: none; color: white; padding: 14px 25px; border-radius: 14px; cursor: pointer; flex: 1.5; font-weight: 800; font-size: 1rem; transition: 0.3s; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);">Start</button>
            <button id="stopBtn" onclick="pause()" style="background: #ef4444; border: none; color: white; padding: 14px 25px; border-radius: 14px; cursor: pointer; flex: 1.5; display: none; font-weight: 800; font-size: 1rem; transition: 0.3s; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);">Pause</button>
            <button onclick="reset()" style="background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.2); color: white; padding: 14px 25px; border-radius: 14px; cursor: pointer; flex: 1; font-weight: 700; transition: 0.3s;">Reset</button>
        </div>

        <p id="footer-text" style="margin-top: 40px; color: #f0f0f0; opacity: 0.9; font-size: 0.75rem; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">
            Stay Focused on the Peak 🏔️
        </p>
    </div>
</div>

<script>
    let mode = 'stopwatch';
    let timeInSeconds = 0;
    let interval = null;

    function switchMode(newMode) {
        pause();
        reset();
        mode = newMode;
        document.getElementById('timer-inputs').style.display = (mode === 'timer') ? 'flex' : 'none';
        
        // Tab styling update for better contrast
        const swTab = document.getElementById('sw-tab');
        const tmTab = document.getElementById('tm-tab');
        
        if(mode === 'stopwatch') {
            swTab.style.background = 'rgba(255,255,255,0.2)';
            swTab.style.color = 'white';
            tmTab.style.background = 'transparent';
            tmTab.style.color = '#e0e0e0';
        } else {
            tmTab.style.background = 'rgba(255,255,255,0.2)';
            tmTab.style.color = 'white';
            swTab.style.background = 'transparent';
            swTab.style.color = '#e0e0e0';
        }
    }

    function handleStart() {
        if (interval) return;

        if (mode === 'timer' && timeInSeconds === 0) {
            const m = parseInt(document.getElementById('input-mins').value) || 0;
            const s = parseInt(document.getElementById('input-secs').value) || 0;
            timeInSeconds = (m * 60) + s;
            if (timeInSeconds <= 0) return alert("Please set a time!");
            document.getElementById('display').innerText = formatTime(timeInSeconds);
        }

        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'block';

        interval = setInterval(() => {
            if (mode === 'stopwatch') {
                timeInSeconds++;
            } else {
                timeInSeconds--;
                if (timeInSeconds <= 0) {
                    pause();
                    alert("Time's up!");
                }
            }
            document.getElementById('display').innerText = formatTime(timeInSeconds);
        }, 1000);
    }

    function pause() {
        clearInterval(interval);
        interval = null;
        document.getElementById('startBtn').style.display = 'block';
        document.getElementById('stopBtn').style.display = 'none';
    }

    function reset() {
        pause();
        timeInSeconds = 0;
        document.getElementById('display').innerText = "00:00:00";
    }

    function formatTime(totalSeconds) {
        if (totalSeconds < 0) totalSeconds = 0;
        const hrs = Math.floor(totalSeconds / 3600);
        const mins = Math.floor((totalSeconds % 3600) / 60);
        const secs = totalSeconds % 60;
        return `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }
</script>
{% endblock %}
