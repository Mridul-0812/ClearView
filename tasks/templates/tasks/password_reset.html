{% extends "tasks/layout.html" %}

{% block body %}
<div class="welcome-background">
    <div class="glass-card">
        <div class="logo-wrapper">
            <h1 class="brand-logo">ClearView</h1>
            <div class="logo-underline"></div>
        </div>
        
        <p class="tagline">Reset your password</p>
        
        <form method="post" class="reset-form">
            {% csrf_token %}
            <div class="glass-input-group">
                {{ form.email.label_tag }}
                {{ form.email }}
            </div>
            
            <button type="submit" class="btn-signin">Send Reset Link</button>
        </form>

        <div class="footer-links">
            <a href="{% url 'tasks:login' %}" class="back-link">← Back to Login</a>
        </div>
    </div>
</div>

<style>
    /* Unique Cursive and Clean Sans */
    @import url('https://fonts.googleapis.com/css2?family=Alex+Brush&family=Inter:wght@300;600&display=swap');

    .welcome-background {
        height: 100vh;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* THE BOX (Glassmorphism) */
    .glass-card {
        background: rgba(255, 255, 255, 0.65);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        padding: 3.5rem 2rem;
        border-radius: 50px;
        text-align: center;
        width: 420px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        border: 1px solid rgba(255, 255, 255, 0.4);
    }

    .brand-logo {
        font-family: 'Alex Brush', cursive;
        font-size: 4rem;
        font-weight: 400;
        margin: 0;
        background: linear-gradient(to right, #2d3436, #636e72);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .tagline {
        font-family: 'Inter', sans-serif;
        color: #636e72;
        font-size: 0.9rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 2rem;
    }

    /* Styling the Django Form specifically */
    .reset-form {
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    .glass-input-group {
        text-align: left;
    }

    .glass-input-group label {
        display: block;
        font-family: 'Inter', sans-serif;
        font-size: 0.8rem;
        margin-bottom: 8px;
        color: #2d3436;
        font-weight: 600;
    }

    .glass-input-group input {
        width: 100%;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid rgba(0, 0, 0, 0.1);
        background: rgba(255, 255, 255, 0.5);
        outline: none;
    }

    .btn-signin {
        background: #716cf2;
        color: white;
        padding: 14px;
        border: none;
        border-radius: 16px;
        font-family: 'Inter', sans-serif;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .btn-signin:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(113, 108, 242, 0.4);
    }

    .footer-links {
        margin-top: 20px;
    }

    .back-link {
        color: #636e72;
        text-decoration: none;
        font-size: 0.8rem;
        font-family: 'Inter', sans-serif;
    }
</style>
{% endblock %}
