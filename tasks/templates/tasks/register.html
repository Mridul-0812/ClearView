{% extends "tasks/layout.html" %}

{% block body %}
<div class="main-wrapper">
    <div class="app-container" style="text-align: center;">
        <div class="header" style="justify-content: center; margin-bottom: 2rem;">
            <h1>Create Account</h1>
        </div>
        
        <form method="post" style="display: flex; flex-direction: column; gap: 15px;">
            {% csrf_token %}
            <div style="text-align: left; color: var(--text-dark);">
                {{ form.as_p }}
            </div>
            
            <button type="submit" class="btn-primary" style="padding: 12px; font-size: 1rem; margin-top: 10px;">Sign Up</button>
        </form>
        
        <div style="margin-top: 20px; font-size: 0.9rem; color: var(--text-muted);">
            Already have an account? <a href="{% url 'tasks:login' %}" style="color: var(--primary); text-decoration: none; font-weight: 600;">Log in here</a>
        </div>
    </div>
</div>

<style>
    input[type="text"], input[type="password"] {
        width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.1);
        background: rgba(255,255,255,0.6); outline: none; margin-top: 5px; font-family: 'Poppins', sans-serif;
    }
    .helptext { font-size: 0.75rem; color: var(--text-muted); }
    ul.errorlist { color: var(--danger); list-style: none; font-size: 0.8rem; padding: 0; }
</style>
{% endblock %}
