{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClearView | Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'tasks/styles.css' %}">
</head>
<body id="bg-target" style="background-image: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)), url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=2070');">

    {% if messages %}
    <div class="messages-wrapper">
        {% for message in messages %}
        <div class="glass-message {{ message.tags }}">
            <span class="message-icon">
                {% if message.tags == 'success' %}✓{% else %}ℹ️{% endif %}
            </span>
            <span class="message-text">{{ message }}</span>
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <button id="bg-switcher" class="bg-toggle-btn" title="Change Background">🖼️</button>

    <div class="container">
        {% block body %}
        {% endblock %}
    </div>

    <style>
        /* Message Styling to match your Glassmorphism UI */
        .messages-wrapper {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            width: 90%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .glass-message {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 12px 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: 'Inter', sans-serif;
            animation: slideDownFade 0.4s ease-out forwards;
        }

        .message-icon {
            font-weight: bold;
            color: #716cf2;
        }

        .message-text {
            color: #2d3436;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Color-coding for success/error */
        .glass-message.success { border-left: 5px solid #55efc4; }
        .glass-message.error { border-left: 5px solid #ff7675; }

        @keyframes slideDownFade {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

    <script>
        // Background Switcher Logic
        const bgTarget = document.querySelector('#bg-target');
        const btn = document.querySelector('#bg-switcher');

        btn.onclick = () => {
            const randomID = Math.floor(Math.random() * 2000);
            const newUrl = `https://picsum.photos/1920/1080?random=${randomID}`;
            
            const img = new Image();
            img.src = newUrl;
            img.onload = () => {
                bgTarget.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('${newUrl}')`;
                btn.style.transform = 'rotate(360deg)';
                setTimeout(() => btn.style.transform = 'rotate(0deg)', 500);
            };
        };

        // Auto-dismiss messages after 5 seconds
        setTimeout(() => {
            const msgs = document.querySelectorAll('.glass-message');
            msgs.forEach(m => {
                m.style.transition = "opacity 0.5s ease";
                m.style.opacity = "0";
                setTimeout(() => m.remove(), 500);
            });
        }, 5000);
    </script>
</body>
</html>
